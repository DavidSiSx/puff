<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokelab - Tactical Engine</title>
    <style>
        body {
            background-color: #0f172a; /* Fondo oscuro */
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            border-top: 6px solid #dc2626; /* Pokeball red */
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-style: italic;
            text-transform: uppercase;
        }
        .header p {
            color: #dc2626;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #b91c1c;
        }
        #mensaje {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            display: none;
        }
        .error { background-color: rgba(220, 38, 38, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .success { background-color: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Pokelab</h1>
            <p>Tactical Engine</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" value="trainer@pokelab.gg" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" value="pikachu123" required>
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>

        <div id="mensaje"></div>
    </div>

    <script>
        // La lógica para conectar la vista con nuestro servidor vulnerable
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');

            try {
                // Enviamos la petición a la misma API que atacan los scripts de Python
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                mensajeDiv.style.display = 'block';
                if (response.ok) {
                    mensajeDiv.className = 'success';
                    mensajeDiv.textContent = data.success;
                } else {
                    mensajeDiv.className = 'error';
                    mensajeDiv.textContent = data.error;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
